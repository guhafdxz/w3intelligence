[theme]
primaryColor = "#6366f1"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#f8fafc"
font = "sans serif"

[server]
headless = true
port = ${PORT:-8501}

[browser]
serverAddress = "localhost"
serverPort = 8501

[client]
caching = "browser"

[runner]
magicEnabled = false